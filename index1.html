<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerencia — Urkupiña</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold: #C9A227;
    --gold-light: #E8C84A;
    --burgundy: #7A1E2E;
    --dark: #1A0A04;
    --panel: #22120A;
    --card: #2C1A0E;
    --cream: #F5ECD7;
    --cream-dark: #E8D5B0;
    --green: #2D6A4F;
    --green-light: #52B788;
    --text-dim: rgba(245,236,215,0.45);
  }
  body {
    font-family: 'Lato', sans-serif;
    background: var(--dark);
    min-height: 100vh;
    color: var(--cream);
  }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(10,5,2,0.96);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000; backdrop-filter: blur(4px);
  }
  .modal-box {
    background: #2C1A0E; border: 1px solid rgba(201,162,39,0.4);
    border-radius: 6px; padding: 2.5rem 2rem;
    width: 100%; max-width: 380px; text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  }
  .modal-icon { font-size: 2.5rem; margin-bottom: 1rem; }
  .modal-title { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--gold); margin-bottom: 0.4rem; }
  .modal-subtitle { font-size: 0.8rem; color: rgba(245,236,215,0.5); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 2rem; }
  .modal-input {
    width: 100%; padding: 0.85rem 1rem;
    background: rgba(245,236,215,0.07); border: 1px solid rgba(201,162,39,0.3);
    border-radius: 4px; color: var(--cream); font-family: 'Lato', sans-serif;
    font-size: 1.3rem; letter-spacing: 0.4em; text-align: center;
    margin-bottom: 1rem; outline: none; transition: border-color 0.2s;
  }
  .modal-input:focus { border-color: var(--gold); }
  .modal-btn {
    width: 100%; padding: 0.85rem; background: var(--gold); color: var(--dark);
    border: none; border-radius: 4px; font-family: 'Lato', sans-serif;
    font-size: 0.9rem; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; cursor: pointer; transition: background 0.2s;
  }
  .modal-btn:hover { background: var(--gold-light); }
  .modal-error { color: #ff6b6b; font-size: 0.8rem; margin-top: 0.7rem; min-height: 1.2em; }
  .modal-back { display: inline-block; margin-top: 1.2rem; font-size: 0.78rem; color: rgba(245,236,215,0.4); text-decoration: none; letter-spacing: 0.08em; transition: color 0.2s; }
  .modal-back:hover { color: var(--gold); }

  /* MODAL FACTURA */
  .factura-overlay {
    position: fixed; inset: 0;
    background: rgba(10,5,2,0.9);
    display: none; align-items: center; justify-content: center;
    z-index: 900; backdrop-filter: blur(4px);
    padding: 1rem;
  }
  .factura-overlay.open { display: flex; }
  .factura-modal {
    background: var(--cream);
    color: var(--dark);
    border-radius: 4px;
    width: 100%; max-width: 420px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.8);
  }
  .factura-header {
    background: var(--burgundy);
    color: var(--cream);
    padding: 1.5rem 1.5rem 1rem;
    text-align: center;
  }
  .factura-logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem; font-weight: 900;
    color: var(--gold-light);
    letter-spacing: 0.04em;
  }
  .factura-sub {
    font-size: 0.72rem; letter-spacing: 0.15em;
    text-transform: uppercase; opacity: 0.7;
    margin-top: 0.15rem;
  }
  .factura-body { padding: 1.5rem; }
  .factura-row {
    display: flex; justify-content: space-between;
    margin-bottom: 0.5rem; font-size: 0.85rem;
  }
  .factura-row.bold { font-weight: 700; }
  .factura-divider {
    border: none; border-top: 1px dashed rgba(44,26,14,0.2);
    margin: 0.8rem 0;
  }
  .factura-num {
    font-size: 0.7rem; color: rgba(44,26,14,0.5);
    text-align: center; margin-bottom: 1.2rem;
    letter-spacing: 0.06em;
  }
  .factura-items { margin-bottom: 1rem; }
  .factura-item {
    display: flex; justify-content: space-between;
    align-items: flex-start; gap: 0.5rem;
    padding: 0.4rem 0;
    border-bottom: 1px solid rgba(44,26,14,0.08);
    font-size: 0.85rem;
  }
  .factura-item:last-child { border-bottom: none; }
  .fitem-name { flex: 1; color: var(--text); }
  .fitem-qty { color: rgba(44,26,14,0.5); font-size: 0.78rem; }
  .fitem-price { font-weight: 700; white-space: nowrap; }
  .factura-total-row {
    display: flex; justify-content: space-between;
    padding: 0.8rem 0;
    border-top: 2px solid var(--dark);
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem; font-weight: 700;
  }
  .factura-total-row .price { color: var(--burgundy); }
  .factura-footer {
    background: rgba(44,26,14,0.06);
    padding: 1rem 1.5rem;
    text-align: center;
    font-size: 0.72rem;
    color: rgba(44,26,14,0.5);
    letter-spacing: 0.05em;
    border-top: 1px solid rgba(44,26,14,0.1);
  }
  .factura-actions {
    padding: 1rem 1.5rem;
    display: flex; gap: 0.5rem;
  }
  .btn-factura-close {
    flex: 1; padding: 0.7rem;
    background: var(--dark); color: var(--cream);
    border: none; border-radius: 3px;
    font-family: 'Lato', sans-serif;
    font-size: 0.82rem; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase;
    cursor: pointer; transition: background 0.2s;
  }
  .btn-factura-close:hover { background: #3A2410; }
  .btn-factura-print {
    flex: 1; padding: 0.7rem;
    background: var(--gold); color: var(--dark);
    border: none; border-radius: 3px;
    font-family: 'Lato', sans-serif;
    font-size: 0.82rem; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase;
    cursor: pointer; transition: background 0.2s;
  }
  .btn-factura-print:hover { background: var(--gold-light); }

  /* APP */
  .app { display: none; min-height: 100vh; flex-direction: column; }
  .app.visible { display: flex; }
  .header {
    background: rgba(34,18,10,0.97);
    border-bottom: 1px solid rgba(201,162,39,0.2);
    padding: 1rem 2rem;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .header-brand { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--gold); font-weight: 900; }
  .header-brand span { color: var(--cream); font-size: 0.85rem; font-weight: 300; margin-left: 0.5rem; font-family: 'Lato', sans-serif; letter-spacing: 0.1em; }
  .btn-nav {
    padding: 0.4rem 0.9rem; border-radius: 3px;
    font-size: 0.78rem; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase;
    cursor: pointer; border: 1px solid; transition: all 0.2s;
    font-family: 'Lato', sans-serif;
    background: transparent; border-color: rgba(201,162,39,0.4);
    color: var(--cream-dark); text-decoration: none; display: inline-block;
  }
  .btn-nav:hover { border-color: var(--gold); color: var(--gold); }

  .content { flex: 1; padding: 1.5rem 2rem 3rem; max-width: 1200px; width: 100%; margin: 0 auto; }

  /* STATS */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 1rem;
    margin-bottom: 2rem;
  }
  .stat-card {
    background: var(--card);
    border: 1px solid rgba(201,162,39,0.15);
    border-radius: 6px;
    padding: 1.2rem 1.4rem;
  }
  .stat-label { font-size: 0.72rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.4rem; }
  .stat-value { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 900; color: var(--gold); line-height: 1; }
  .stat-unit { font-family: 'Lato', sans-serif; font-size: 0.9rem; color: var(--cream-dark); margin-left: 0.3rem; }
  .stat-sub { font-size: 0.75rem; color: var(--text-dim); margin-top: 0.3rem; }

  /* FILTROS */
  .filter-bar {
    display: flex; gap: 0.5rem; align-items: center;
    margin-bottom: 1.2rem; flex-wrap: wrap;
  }
  .filter-label { font-size: 0.78rem; color: var(--text-dim); letter-spacing: 0.06em; }
  .filter-btn {
    padding: 0.35rem 0.85rem;
    border-radius: 20px; font-size: 0.75rem;
    font-weight: 700; letter-spacing: 0.06em;
    text-transform: uppercase; cursor: pointer;
    border: 1px solid; transition: all 0.2s;
    font-family: 'Lato', sans-serif;
    background: transparent;
    border-color: rgba(201,162,39,0.2);
    color: var(--text-dim);
  }
  .filter-btn.active {
    background: rgba(201,162,39,0.15);
    border-color: var(--gold);
    color: var(--gold);
  }
  .filter-btn:hover { border-color: rgba(201,162,39,0.5); color: var(--cream); }

  /* TABLA */
  .tabla-wrap {
    background: var(--card);
    border: 1px solid rgba(201,162,39,0.15);
    border-radius: 6px;
    overflow: hidden;
  }
  .tabla-header {
    padding: 1rem 1.5rem;
    border-bottom: 1px solid rgba(201,162,39,0.15);
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 0.5rem;
  }
  .tabla-title { font-family: 'Playfair Display', serif; font-size: 1rem; color: var(--cream); }
  .btn-limpiar-todo {
    padding: 0.35rem 0.85rem;
    background: rgba(122,30,46,0.15);
    border: 1px solid rgba(122,30,46,0.4);
    border-radius: 3px; color: #e07a8a;
    font-size: 0.72rem; font-weight: 700;
    letter-spacing: 0.06em; text-transform: uppercase;
    cursor: pointer; transition: all 0.2s;
    font-family: 'Lato', sans-serif;
  }
  .btn-limpiar-todo:hover { background: rgba(122,30,46,0.3); }

  table { width: 100%; border-collapse: collapse; }
  thead th {
    padding: 0.75rem 1rem;
    font-size: 0.7rem; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--text-dim);
    text-align: left;
    border-bottom: 1px solid rgba(201,162,39,0.1);
    background: rgba(245,236,215,0.02);
  }
  tbody tr {
    border-bottom: 1px solid rgba(245,236,215,0.04);
    transition: background 0.15s;
  }
  tbody tr:hover { background: rgba(245,236,215,0.03); }
  tbody tr:last-child { border-bottom: none; }
  tbody td {
    padding: 0.85rem 1rem;
    font-size: 0.85rem;
    color: var(--cream);
    vertical-align: middle;
  }
  .cell-mesa { font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 700; color: var(--gold); }
  .cell-hora { color: var(--text-dim); font-size: 0.78rem; }
  .cell-platos { font-size: 0.8rem; color: var(--cream-dark); }
  .cell-plato-item { white-space: nowrap; }
  .cell-total { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 1rem; color: var(--gold); }
  .estado-pill {
    display: inline-flex; align-items: center;
    font-size: 0.65rem; font-weight: 700;
    letter-spacing: 0.07em; text-transform: uppercase;
    padding: 0.2rem 0.6rem; border-radius: 20px;
  }
  .pill-pendiente { background: rgba(224,122,58,0.2); color: #E8944A; border: 1px solid rgba(224,122,58,0.4); }
  .pill-preparando { background: rgba(201,162,39,0.2); color: var(--gold); border: 1px solid rgba(201,162,39,0.4); }
  .pill-listo { background: rgba(45,106,79,0.2); color: var(--green-light); border: 1px solid rgba(45,106,79,0.4); }
  .pill-entregado { background: rgba(245,236,215,0.07); color: rgba(245,236,215,0.35); border: 1px solid rgba(245,236,215,0.1); }

  .btn-facturar {
    padding: 0.4rem 0.8rem;
    background: var(--burgundy); color: var(--cream);
    border: none; border-radius: 3px;
    font-size: 0.72rem; font-weight: 700;
    letter-spacing: 0.06em; text-transform: uppercase;
    cursor: pointer; transition: background 0.2s;
    font-family: 'Lato', sans-serif;
  }
  .btn-facturar:hover { background: #9A2540; }
  .btn-facturar.entregado {
    background: rgba(245,236,215,0.06);
    color: rgba(245,236,215,0.35);
    cursor: default;
    border: 1px solid rgba(245,236,215,0.1);
  }
  .btn-facturar.entregado:hover { background: rgba(245,236,215,0.06); }

  .empty-state {
    text-align: center; padding: 4rem 2rem;
    color: rgba(245,236,215,0.3);
  }
  .empty-icon { font-size: 3rem; margin-bottom: 1rem; }
  .empty-text { font-size: 0.9rem; }

  @media print {
    body * { visibility: hidden; }
    .factura-modal, .factura-modal * { visibility: visible; }
    .factura-modal { position: fixed; inset: 0; max-width: none; max-height: none; }
    .factura-actions { display: none; }
  }
</style>
</head>
<body>

<!-- MODAL CLAVE -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box">
    <div class="modal-icon">📊</div>
    <div class="modal-title">Área Restringida</div>
    <div class="modal-subtitle">Gerencia — Solo administración</div>
    <input type="password" class="modal-input" id="passInput" placeholder="• • • •" maxlength="10" />
    <button class="modal-btn" onclick="verificarClave()">Ingresar</button>
    <div class="modal-error" id="passError"></div>
    <a href="index.html" class="modal-back">← Volver al inicio</a>
  </div>
</div>

<!-- MODAL FACTURA -->
<div class="factura-overlay" id="facturaOverlay" onclick="cerrarFactura(event)">
  <div class="factura-modal" id="facturaModal">
    <!-- Se llena dinámicamente -->
  </div>
</div>

<!-- APP -->
<div class="app" id="mainApp">
  <header class="header">
    <div class="header-brand">Urkupiña <span>/ Gerencia</span></div>
    <a href="index.html"><button class="btn-nav">Inicio</button></a>
  </header>

  <div class="content">
    <!-- STATS -->
    <div class="stats-grid" id="statsGrid"></div>

    <!-- TABLA -->
    <div class="tabla-wrap">
      <div class="tabla-header">
        <span class="tabla-title">🧾 Registro de Pedidos</span>
        <div style="display:flex;gap:0.5rem;align-items:center;flex-wrap:wrap;">
          <div class="filter-bar" style="margin:0;gap:0.4rem;">
            <button class="filter-btn active" onclick="setFiltro('todos', this)">Todos</button>
            <button class="filter-btn" onclick="setFiltro('pendiente', this)">Pendientes</button>
            <button class="filter-btn" onclick="setFiltro('preparando', this)">Preparando</button>
            <button class="filter-btn" onclick="setFiltro('listo', this)">Listos</button>
            <button class="filter-btn" onclick="setFiltro('entregado', this)">Entregados</button>
          </div>
          <button class="btn-limpiar-todo" onclick="limpiarTodo()">🗑 Limpiar todo</button>
        </div>
      </div>
      <div id="tablaContainer"></div>
    </div>
  </div>
</div>

<script>
const CLAVE = '2345';
let filtroActivo = 'todos';

document.getElementById('passInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') verificarClave();
});
function verificarClave() {
  const v = document.getElementById('passInput').value;
  if (v === CLAVE) {
    document.getElementById('modalOverlay').style.display = 'none';
    document.getElementById('mainApp').classList.add('visible');
    renderApp();
    setInterval(renderApp, 4000);
  } else {
    const err = document.getElementById('passError');
    err.textContent = 'Contraseña incorrecta.';
    document.getElementById('passInput').value = '';
    document.getElementById('passInput').focus();
    setTimeout(() => err.textContent = '', 2500);
  }
}

function getPedidos() { return JSON.parse(localStorage.getItem('urku_pedidos') || '[]'); }
function savePedidos(p) { localStorage.setItem('urku_pedidos', JSON.stringify(p)); }

function setFiltro(f, btn) {
  filtroActivo = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTabla();
}

function renderApp() {
  renderStats();
  renderTabla();
}

function renderStats() {
  const pedidos = getPedidos();
  const entregados = pedidos.filter(p => p.estado === 'entregado');
  const totalRecaudado = entregados.reduce((s, p) => s + p.total, 0);
  const pendientes = pedidos.filter(p => p.estado === 'pendiente').length;
  const enProceso = pedidos.filter(p => p.estado === 'preparando' || p.estado === 'listo').length;

  const stats = [
    { label: 'Total recaudado', value: totalRecaudado, unit: 'Bs.', sub: 'Pedidos entregados' },
    { label: 'Pedidos totales', value: pedidos.length, unit: '', sub: 'Registros del día' },
    { label: 'Pendientes', value: pendientes, unit: '', sub: 'Esperando cocina' },
    { label: 'En proceso', value: enProceso, unit: '', sub: 'Preparando o listos' },
  ];

  document.getElementById('statsGrid').innerHTML = stats.map(s => `
    <div class="stat-card">
      <div class="stat-label">${s.label}</div>
      <div class="stat-value">${s.unit === 'Bs.' ? s.unit + ' ' : ''}${s.value}${s.unit && s.unit !== 'Bs.' ? ' ' + s.unit : ''}</div>
      <div class="stat-sub">${s.sub}</div>
    </div>`).join('');
}

function renderTabla() {
  const todos = getPedidos().reverse();
  const filtrados = filtroActivo === 'todos' ? todos : todos.filter(p => p.estado === filtroActivo);
  const container = document.getElementById('tablaContainer');

  if (filtrados.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">No hay pedidos registrados aún</div></div>`;
    return;
  }

  const estadoLabel = { pendiente: 'Pendiente', preparando: 'Preparando', listo: 'Listo', entregado: 'Entregado' };

  container.innerHTML = `
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Mesa</th>
          <th>Hora</th>
          <th>Platos</th>
          <th>Total</th>
          <th>Estado</th>
          <th>Acción</th>
        </tr>
      </thead>
      <tbody>
        ${filtrados.map((p, i) => `
          <tr>
            <td class="cell-hora">${i + 1}</td>
            <td class="cell-mesa">Mesa ${p.mesa}</td>
            <td class="cell-hora">${p.hora}</td>
            <td class="cell-platos">
              ${p.items.map(it => `<div class="cell-plato-item">${it.emoji} ${it.plato} ×${it.cantidad}</div>`).join('')}
            </td>
            <td class="cell-total">Bs. ${p.total}</td>
            <td><span class="estado-pill pill-${p.estado}">${estadoLabel[p.estado]}</span></td>
            <td>
              <button class="btn-facturar ${p.estado === 'entregado' ? '' : ''}" onclick="abrirFactura(${p.id})">
                🧾 Factura
              </button>
            </td>
          </tr>`).join('')}
      </tbody>
    </table>`;
}

function abrirFactura(id) {
  const pedido = getPedidos().find(p => p.id === id);
  if (!pedido) return;

  const facturaNum = String(id).slice(-6);
  const estadoLabel = { pendiente: 'Pendiente', preparando: 'En preparación', listo: 'Listo para entregar', entregado: 'Pagado / Entregado' };

  const itemsHTML = pedido.items.map(it => `
    <div class="factura-item">
      <span class="fitem-name">${it.emoji} ${it.plato}${it.tipo === 'completo' ? `<br><small style="color:rgba(44,26,14,0.45);font-size:0.72rem;">Completo · Sopa: ${it.sopa}</small>` : '<br><small style="color:rgba(44,26,14,0.45);font-size:0.72rem;">Solo segundo</small>'}</span>
      <span class="fitem-qty">×${it.cantidad}</span>
      <span class="fitem-price">Bs. ${it.subtotal}</span>
    </div>`).join('');

  document.getElementById('facturaModal').innerHTML = `
    <div class="factura-header">
      <div class="factura-logo">Urkupiña</div>
      <div class="factura-sub">Sabores del corazón de Bolivia</div>
    </div>
    <div class="factura-body">
      <div class="factura-num">FACTURA N° ${facturaNum} · ${pedido.fecha}</div>
      <div class="factura-row">
        <span>Mesa</span>
        <span><strong>Mesa ${pedido.mesa}</strong></span>
      </div>
      <div class="factura-row">
        <span>Hora</span>
        <span>${pedido.hora}</span>
      </div>
      <div class="factura-row">
        <span>Estado</span>
        <span><strong>${estadoLabel[pedido.estado] || pedido.estado}</strong></span>
      </div>
      <hr class="factura-divider">
      <div style="font-size:0.7rem;color:rgba(44,26,14,0.5);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:0.7rem;">Detalle del pedido</div>
      <div class="factura-items">${itemsHTML}</div>
      <hr class="factura-divider">
      <div class="factura-total-row">
        <span>TOTAL A PAGAR</span>
        <span class="price">Bs. ${pedido.total}</span>
      </div>
    </div>
    <div class="factura-footer">
      Restaurante Urkupiña · Sucre, Bolivia<br>
      ¡Gracias por su preferencia! Que aproveche.
    </div>
    <div class="factura-actions">
      <button class="btn-factura-close" onclick="cerrarFactura()">Cerrar</button>
      <button class="btn-factura-print" onclick="window.print()">🖨 Imprimir</button>
    </div>`;

  document.getElementById('facturaOverlay').classList.add('open');
}

function cerrarFactura(e) {
  if (!e || e.target === document.getElementById('facturaOverlay')) {
    document.getElementById('facturaOverlay').classList.remove('open');
  }
}

function limpiarTodo() {
  if (confirm('¿Seguro que deseas borrar todos los pedidos? Esta acción no se puede deshacer.')) {
    localStorage.removeItem('urku_pedidos');
    renderApp();
  }
}
</script>
</body>
</html>
